services:

  # ===========================================
  # PostgreSQL - 共享数据库
  #
  # install extension
  # podman exec -it neomagi-postgres psql -U devdb_user -d devdb
  # "CREATE EXTENSION IF NOT EXISTS pg_search;"
  # "CREATE EXTENSION IF NOT EXISTS vector;"
  # check installed extensions
  # podman exec -it neomagi-postgres psql -U devdb_user -d devdb -c '\dx'
  # ===========================================
  postgres:
    image: docker.io/paradedb/paradedb:0.21.12-pg17
    container_name: neomagi-postgres
    restart: unless-stopped
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_USER: ${DATABASE_USER:-neomagi}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:?DATABASE_PASSWORD must be set in .env}
      POSTGRES_DB: ${DATABASE_NAME:-neomagi}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres-data:/var/lib/postgresql/data
      # Optional: mount SQL/init scripts only when you actually need them.
      # - ./init-scripts:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  postgres-data:
